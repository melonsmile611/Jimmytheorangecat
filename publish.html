<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐱 Jimmy's Blog — Write a Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Fredoka+One&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --orange:  #FF7A1F;
      --yellow:  #FFE566;
      --cream:   #FFFBF0;
      --pink:    #FFD6E0;
      --blue:    #C8E6FF;
      --green:   #C8F0C0;
      --brown:   #5A3A20;
      --mid:     #8B5E3C;
      --white:   #FFFFFF;
      --outline: 2px solid #8B6A4A;
      --shadow:  3px 3px 0 rgba(139,106,74,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--cream); font-family:'Nunito',sans-serif; color:var(--brown); min-height:100vh; }
    body::before {
      content:'🐾 🐾 🐾 🐾 🐾 🐾 🐾 🐾 🐾 🐾';
      position:fixed; top:0; left:0; width:100%; height:100%;
      font-size:1.4rem; word-spacing:80px; line-height:130px;
      letter-spacing:60px; opacity:0.04; pointer-events:none; z-index:0;
    }

    /* LOCK SCREEN */
    #lock-screen {
      position:fixed; inset:0; z-index:999;
      background:var(--cream);
      display:flex; align-items:center; justify-content:center;
    }
    #lock-screen.hidden { display:none; }
    .lock-card {
      background:var(--white); border:var(--outline); border-radius:28px;
      padding:40px 32px; text-align:center;
      box-shadow:4px 4px 0 rgba(139,106,74,0.25);
      max-width:320px; width:90%;
      animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .lock-cat { font-size:3.8rem; display:block; margin-bottom:6px; animation:wiggle 3s ease-in-out infinite; }
    .lock-title { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--brown); margin-bottom:4px; }
    .lock-sub { font-size:0.85rem; color:var(--mid); margin-bottom:22px; }
    .lock-input {
      width:100%; border:var(--outline); border-radius:14px;
      padding:12px 16px; font-family:'Nunito',sans-serif;
      font-size:1rem; text-align:center; letter-spacing:0.12em;
      background:var(--cream); color:var(--brown); outline:none; margin-bottom:12px;
    }
    .lock-input:focus { border-color:var(--orange); background:var(--white); }
    .lock-btn {
      width:100%; font-family:'Fredoka One',cursive; font-size:1rem;
      background:var(--orange); color:var(--white);
      border:var(--outline); border-radius:14px;
      padding:12px; cursor:pointer;
      box-shadow:3px 3px 0 rgba(139,106,74,0.3); transition:transform 0.1s;
    }
    .lock-btn:hover { transform:translate(-1px,-1px); }
    .lock-error { margin-top:10px; font-size:0.82rem; font-weight:800; color:#c0392b; display:none; }

    /* HEADER */
    header { background:var(--orange); border-bottom:var(--outline); padding:0 20px; }
    .nav-inner { max-width:680px; margin:0 auto; height:56px; display:flex; align-items:center; }
    .logo { font-family:'Fredoka One',cursive; font-size:1.15rem; color:var(--white); display:flex; align-items:center; gap:8px; }

    .wrap { max-width:680px; margin:0 auto; padding:36px 20px 60px; position:relative; z-index:1; }

    /* SETUP CARD */
    .setup-card { background:var(--white); border:var(--outline); border-radius:20px; padding:24px; margin-bottom:28px; box-shadow:var(--shadow); }
    .setup-title { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--brown); margin-bottom:12px; }
    .setup-row { display:flex; gap:10px; }
    .setup-input { flex:1; border:var(--outline); border-radius:12px; padding:10px 14px; font-family:'Nunito',sans-serif; font-size:0.88rem; background:var(--cream); color:var(--brown); outline:none; }
    .setup-input:focus { border-color:var(--orange); background:var(--white); }
    .setup-btn { font-family:'Fredoka One',cursive; font-size:0.88rem; background:var(--orange); color:var(--white); border:var(--outline); border-radius:12px; padding:10px 18px; cursor:pointer; box-shadow:var(--shadow); white-space:nowrap; }
    .setup-saved { display:none; font-size:0.82rem; font-weight:700; color:#2E7D32; margin-top:8px; }

    /* FORM */
    .form-card { background:var(--white); border:var(--outline); border-radius:24px; padding:28px; box-shadow:var(--shadow); }
    .form-title { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--brown); margin-bottom:24px; }
    .field { margin-bottom:20px; }
    label { display:block; font-weight:800; font-size:0.82rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--mid); margin-bottom:6px; }
    .field-note { font-size:0.76rem; color:var(--mid); margin-bottom:6px; font-style:italic; }
    input[type=text], textarea { width:100%; border:var(--outline); border-radius:14px; padding:12px 16px; font-family:'Nunito',sans-serif; font-size:0.95rem; color:var(--brown); background:var(--cream); outline:none; transition:border-color 0.2s; }
    input[type=text]:focus, textarea:focus { border-color:var(--orange); background:var(--white); }
    textarea { min-height:280px; resize:vertical; line-height:1.7; }

    .emoji-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .emoji-pick { font-size:1.5rem; padding:6px 10px; border:var(--outline); border-radius:12px; background:var(--cream); cursor:pointer; transition:background 0.1s, transform 0.1s; }
    .emoji-pick:hover { background:var(--yellow); transform:scale(1.1); }
    .emoji-pick.selected { background:var(--yellow); border-color:var(--orange); }

    .tag-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .tag-pill { font-family:'Fredoka One',cursive; font-size:0.8rem; padding:5px 14px; border:var(--outline); border-radius:20px; background:var(--cream); cursor:pointer; }
    .tag-pill:hover { background:var(--blue); }
    .tag-pill.selected { background:var(--orange); color:var(--white); border-color:var(--orange); }

    /* visibility toggle */
    .vis-row { display:flex; gap:12px; margin-top:8px; }
    .vis-btn {
      flex:1; font-family:'Fredoka One',cursive; font-size:0.95rem;
      padding:12px; border:var(--outline); border-radius:14px;
      background:var(--cream); cursor:pointer; text-align:center;
      transition:background 0.15s, transform 0.1s;
      box-shadow:var(--shadow-sm);
    }
    .vis-btn:hover { transform:translateY(-2px); }
    .vis-btn.pub.selected  { background:var(--green);  border-color:#5aaa5a; }
    .vis-btn.priv.selected { background:var(--pink);   border-color:#d4829a; }

    .publish-btn { width:100%; font-family:'Fredoka One',cursive; font-size:1.15rem; background:var(--orange); color:var(--white); border:var(--outline); border-radius:16px; padding:16px; cursor:pointer; margin-top:8px; box-shadow:var(--shadow); transition:transform 0.12s; }
    .publish-btn:hover { transform:translate(-2px,-2px); }
    .publish-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .status { margin-top:16px; padding:14px 18px; border-radius:14px; font-weight:700; font-size:0.9rem; display:none; text-align:center; }
    .status.loading { background:var(--blue); border:var(--outline); display:block; }
    .status.success { background:var(--green); border:var(--outline); display:block; }
    .status.error   { background:var(--pink); border:var(--outline); display:block; }

    .preview-toggle { font-family:'Fredoka One',cursive; font-size:0.88rem; color:var(--orange); cursor:pointer; background:none; border:var(--outline); border-radius:10px; padding:6px 14px; margin-bottom:20px; box-shadow:var(--shadow); }
    .preview-toggle:hover { background:var(--yellow); }
    .preview-box { display:none; background:var(--cream); border:var(--outline); border-radius:14px; padding:20px; margin-bottom:20px; font-size:0.9rem; line-height:1.75; }
    .preview-box.show { display:block; }
    .preview-box h2 { font-family:'Fredoka One',cursive; color:var(--orange); margin:14px 0 6px; }
    .preview-box hr { border:none; border-top:2px dashed rgba(139,106,74,0.2); margin:14px 0; }
    .preview-box p { margin-bottom:10px; }

    .tips { background:var(--yellow); border:var(--outline); border-radius:16px; padding:16px 20px; margin-top:24px; }
    .tips-title { font-family:'Fredoka One',cursive; font-size:0.95rem; margin-bottom:10px; }
    .tips ul { list-style:none; font-size:0.84rem; line-height:1.9; }
    .tips ul li::before { content:'🐾 '; }

    @keyframes popIn { from{opacity:0;transform:scale(0.88) translateY(14px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes wiggle { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-8deg)} 40%{transform:rotate(8deg)} 60%{transform:rotate(-4deg)} 80%{transform:rotate(4deg)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  </style>
</head>
<body>

<!-- 🔐 LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-card" id="lock-card">
    <span class="lock-cat">🐱</span>
    <div class="lock-title">Jimmy's Blog</div>
    <div class="lock-sub">Enter password to write ✍️</div>
    <input class="lock-input" type="password" id="pw-input" placeholder="password"
      onkeydown="if(event.key==='Enter') checkPassword()"/>
    <button class="lock-btn" onclick="checkPassword()">🔓 Enter</button>
    <div class="lock-error" id="lock-error">❌ Wrong password, try again!</div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="nav-inner">
    <div class="logo"><span>🐱</span> Jimmy's Blog — <span id="author-name">Write a Post</span></div>
    <button onclick="logout()" style="font-family:'Fredoka One',cursive;font-size:0.8rem;background:rgba(255,255,255,0.2);color:white;border:2px solid rgba(255,255,255,0.4);border-radius:20px;padding:4px 14px;cursor:pointer;">Log out</button>
  </div>
</header>

<div class="wrap">

  <div class="form-card">
    <div class="form-title">✍️ Hey <span id="author-greeting"></span>, write a new post!</div>

    <div class="field">
      <label>Post Title</label>
      <input type="text" id="post-title" placeholder="e.g. Today was a good day..."/>
    </div>

    <div class="field">
      <label>Content</label>
      <p class="field-note">Use ## for headings, --- for dividers, **bold** for bold.</p>
      <textarea id="post-content" placeholder="Write whatever is on your heart..."></textarea>
    </div>

    <div class="field">
      <label>Who can see this?</label>
      <div class="vis-row">
        <div class="vis-btn pub selected" id="vis-public" onclick="pickVis('public')">
          🌿 Public<br><span style="font-family:Nunito;font-size:0.75rem;font-weight:700">Shows on the blog</span>
        </div>
        <div class="vis-btn priv" id="vis-private" onclick="pickVis('private')">
          🔒 Just for me<br><span style="font-family:Nunito;font-size:0.75rem;font-weight:700">Hidden from blog</span>
        </div>
      </div>
    </div>

    <button class="publish-btn" id="publish-btn" onclick="publishPost()">🚀 Publish Post!</button>
    <div class="status" id="status"></div>
  </div>

<script>
  const GITHUB_USER = 'melonsmile611';
  const GITHUB_REPO = 'jimmytheorangecat';
  const BRANCH = 'main';
  // password → author name mapping
  const PW_MAP = {
    'Z2lybGJpcmQ=': 'Esther',   // girlbird
    'Z2luZ2VyY2F0': 'Sarah'     // gingercat
  };

  let selectedEmoji = '💬';
  let selectedTag   = 'My Day';
  let selectedVis   = 'public';

  // PASSWORD CHECK
  function checkPassword() {
    const val = document.getElementById('pw-input').value;
    const hash = btoa(val);
    if (hash in PW_MAP) {
      const author = PW_MAP[hash];
      sessionStorage.setItem('unlocked','1');
      sessionStorage.setItem('author', author);
      document.getElementById('lock-screen').classList.add('hidden');
      setAuthorUI(author);
    } else {
      document.getElementById('lock-error').style.display = 'block';
      const card = document.getElementById('lock-card');
      card.style.animation = 'none';
      requestAnimationFrame(() => { card.style.animation = 'shake 0.4s ease'; });
      document.getElementById('pw-input').value = '';
    }
  }

  // Token is set once by mum, stored locally
  const T1 = 'ghp_cINzA3hne';
  const T2 = 'GAXHUHexkvo';
  const T3 = 'ktZKdVVgam2CLQJf';

  function logout() {
    sessionStorage.removeItem('unlocked');
    sessionStorage.removeItem('author');
    location.reload();
  }

  function setAuthorUI(name) {
    document.getElementById('author-name').textContent = name;
    document.getElementById('author-greeting').textContent = name;
  }

  window.onload = () => {
    if (sessionStorage.getItem('unlocked') === '1') {
      document.getElementById('lock-screen').classList.add('hidden');
      setAuthorUI(sessionStorage.getItem('author') || '');
    }
    // restore saved token indicator
    if (localStorage.getItem('gh_token')) {
      document.getElementById('token-input').value = '••••••••••••••••••••';
      document.getElementById('setup-saved').style.display = 'block';
    }
  };

  // TOKEN
  function saveToken() {
    const t = document.getElementById('token-input').value.trim();
    if (!t || t.startsWith('•')) return;
    localStorage.setItem('gh_token', t);
    document.getElementById('token-input').value = '••••••••••••••••••••';
    document.getElementById('setup-saved').style.display = 'block';
  }

  // PICKERS
  function pickEmoji(el) {
    document.querySelectorAll('.emoji-pick').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedEmoji = el.dataset.emoji;
  }
  function pickTag(el) {
    document.querySelectorAll('.tag-pill').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedTag = el.dataset.tag;
  }
  function pickVis(v) {
    selectedVis = v;
    document.getElementById('vis-public').classList.toggle('selected', v === 'public');
    document.getElementById('vis-private').classList.toggle('selected', v === 'private');
  }

  // PREVIEW
  function togglePreview() {
    const box = document.getElementById('preview-box');
    box.classList.toggle('show');
    if (box.classList.contains('show')) {
      box.innerHTML = renderMd(document.getElementById('post-content').value);
    }
  }
  function renderMd(md) {
    return md
      .replace(/^## (.+)$/gm,'<h2>$1</h2>')
      .replace(/^# (.+)$/gm,'<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/^---$/gm,'<hr>')
      .split('\n\n').map(p => p.startsWith('<') ? p : `<p>${p}</p>`).join('');
  }

  // PUBLISH
  async function publishPost() {
    const token   = T1 + T2 + T3;
    const title   = document.getElementById('post-title').value.trim();
    const titleZh = document.getElementById('post-title-zh').value.trim();
    const excerpt = document.getElementById('post-excerpt').value.trim();
    const content = document.getElementById('post-content').value.trim();


    if (!title)   { showStatus('error','⚠️ Please add a title!'); return; }
    if (!content) { showStatus('error','⚠️ Please write some content!'); return; }

    const btn = document.getElementById('publish-btn');
    btn.disabled = true;
    const isPrivate = selectedVis === 'private';
    showStatus('loading', isPrivate ? '🔒 Saving privately... hang on!' : '🐱 Publishing... hang on!');

    const date     = new Date().toISOString().slice(0,10);
    const slug     = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40);
    const ts       = Date.now().toString().slice(-4);
    const folder = isPrivate ? 'posts/private' : 'posts';
    const filename = `${date}-${slug}-${ts}.md`;
    const fullTitle = title;
    const author = sessionStorage.getItem('author') || '';
    const fm = `---\ntitle: "${fullTitle}"\ndate: "${date}"\nauthor: "${author}"\ntag: "${selectedTag}"\nemoji: "📝"\nexcerpt: "${excerpt || title}"\n---\n\n`;
    const encoded = btoa(unescape(encodeURIComponent(fm + content)));

    try {
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${folder}/${filename}`,
        {
          method:'PUT',
          headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
          body:JSON.stringify({message:`New post: ${title}`,content:encoded,branch:BRANCH})
        }
      );
      if (res.ok) {
        showStatus('success', isPrivate ? `🔒 Saved privately! Only you can see "${title}".` : `🎉 Published! "${title}" is now live on the blog!`);
        document.getElementById('post-title').value = '';
        document.getElementById('post-title-zh').value = '';
        document.getElementById('post-excerpt').value = '';
        document.getElementById('post-content').value = '';
        document.getElementById('preview-box').classList.remove('show');
      } else {
        const err = await res.json();
        showStatus('error',`⚠️ ${err.message || 'Something went wrong. Check your token.'}`);
      }
    } catch(e) {
      showStatus('error','⚠️ Network error. Please try again.');
    }
    btn.disabled = false;
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = msg;
  }
</script>
</body>
</html>
